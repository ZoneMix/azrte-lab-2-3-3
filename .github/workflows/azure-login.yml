name: Azure Login
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: |
          az storage blob download --name flag.txt --file flag.txt --account-name ${{ secrets.AZURE_ACCOUNT_NAME }} --container-name flag --auth-mode login
          cat flag.txt

